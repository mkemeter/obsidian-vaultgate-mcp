<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <title>VaultGate — Your Obsidian vault, accessible to any AI assistant</title>
  <defs>
    <linearGradient id="bg-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="gem-top-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="gem-mid-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <radialGradient id="glow-d" cx="25%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: GitHub dark mode -->
  <rect width="1200" height="280" fill="#0d1117"/>
  <!-- Soft glow behind gem -->
  <rect width="1200" height="280" fill="url(#glow-d)"/>

  <!-- Gem icon -->
  <g transform="translate(44, 44) scale(3)">
    <circle cx="32" cy="32" r="30" fill="url(#bg-d)"/>
    <circle cx="32" cy="32" r="26" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.55"/>
    <polygon points="32,11 42,25 32,21 22,25" fill="url(#gem-top-d)"/>
    <polygon points="22,25 32,21 28,41" fill="#a78bfa" opacity="0.9"/>
    <polygon points="42,25 36,41 32,21" fill="#7c3aed" opacity="0.85"/>
    <polygon points="22,25 28,41 36,41 42,25 32,21" fill="url(#gem-mid-d)" opacity="0.7"/>
    <polygon points="28,41 36,41 32,53" fill="#4c1d95"/>
    <polygon points="32,11 37,20 32,18 27,20" fill="white" opacity="0.28"/>
  </g>

  <!-- Wordmark -->
  <text x="272" y="134"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="84" font-weight="700" fill="#f3e8ff" letter-spacing="-2">VaultGate</text>

  <!-- Tagline -->
  <text x="274" y="178"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="25" font-weight="400" fill="#c4b5fd">Your Obsidian vault, accessible to any AI assistant</text>

  <!-- Attribute line -->
  <text x="274" y="215"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="19" font-weight="400" fill="#6b7280" letter-spacing="0.8">locally · privately · no plugins required</text>

  <!-- Decorative portal rings (right) -->
  <circle cx="1090" cy="140" r="90" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.18"/>
  <circle cx="1090" cy="140" r="65" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.25"/>
  <circle cx="1090" cy="140" r="40" fill="none" stroke="#a78bfa" stroke-width="2"   opacity="0.35"/>
  <circle cx="1090" cy="140" r="11" fill="#a78bfa" opacity="0.42"/>
  <!-- Cardinal spokes -->
  <line x1="1090" y1="50"  x2="1090" y2="75"  stroke="#a78bfa" stroke-width="1.5" opacity="0.22"/>
  <line x1="1090" y1="205" x2="1090" y2="230" stroke="#a78bfa" stroke-width="1.5" opacity="0.22"/>
  <line x1="1000" y1="140" x2="1025" y2="140" stroke="#a78bfa" stroke-width="1.5" opacity="0.22"/>
  <line x1="1155" y1="140" x2="1180" y2="140" stroke="#a78bfa" stroke-width="1.5" opacity="0.22"/>
  <!-- Diagonal spokes -->
  <line x1="1026" y1="76"  x2="1043" y2="93"  stroke="#a78bfa" stroke-width="1" opacity="0.16"/>
  <line x1="1154" y1="76"  x2="1137" y2="93"  stroke="#a78bfa" stroke-width="1" opacity="0.16"/>
  <line x1="1026" y1="204" x2="1043" y2="187" stroke="#a78bfa" stroke-width="1" opacity="0.16"/>
  <line x1="1154" y1="204" x2="1137" y2="187" stroke="#a78bfa" stroke-width="1" opacity="0.16"/>
  <!-- Dashed connector -->
  <line x1="960" y1="140" x2="1000" y2="140" stroke="#a78bfa" stroke-width="1" opacity="0.14" stroke-dasharray="4 5"/>
</svg>
