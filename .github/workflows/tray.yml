name: Tray CI / Release

# Build and (optionally) release the VaultGate tray companion app.
# Path-filtered so failures here NEVER block the npm package release pipeline.

on:
  push:
    branches: [main, feature/tray-initial]
    paths:
      - "tray/**"
      - ".github/workflows/tray.yml"
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths:
      - "tray/**"
      - ".github/workflows/tray.yml"

permissions:
  contents: write   # required to create GitHub Releases and upload assets
  actions: write    # required to dispatch publish.yml after release

jobs:
  build:
    runs-on: macos-14   # Apple Silicon — produces arm64 DMG
    name: Build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            tray/package-lock.json

      - name: Sync version from VERSION file
        run: node scripts/sync-version.js

      - name: Install server deps + compile server
        run: |
          npm ci
          npm run build
        working-directory: server

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: tray/assets/models
          key: models-bge-small-en-v1.5

      - name: Install tray deps (rebuilds onnxruntime-node via @electron/rebuild postinstall)
        run: npm ci
        working-directory: tray

      - name: Download embedding model (skipped on cache hit)
        run: node scripts/download-models.js
        working-directory: tray

      - name: Type-check tray
        run: npm run typecheck
        working-directory: tray

      - name: Test tray
        run: npm test
        working-directory: tray

      - name: Build tray sources
        run: npm run build
        working-directory: tray

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build app bundle
        run: npx electron-builder --mac --dir
        working-directory: tray

      - name: Create DMG
        run: node scripts/package-dmg.js
        working-directory: tray

      - name: Publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "VaultGate ${{ github.ref_name }}" \
            --generate-notes 2>/dev/null || true
          gh release upload "${{ github.ref_name }}" \
            dist/VaultGate-*.dmg --clobber
        working-directory: tray
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger npm publish
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh workflow run publish.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tray-mac
          path: tray/dist/*.dmg
