name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # required for OIDC Trusted Publishing and provenance attestation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # No registry-url — npm uses OIDC Trusted Publishing natively.
          # setup-node's registry-url would write an .npmrc expecting NODE_AUTH_TOKEN,
          # which blocks the OIDC flow. Without it, npm detects GitHub Actions env vars
          # and exchanges the OIDC token directly with the npm registry.

      - name: Install dependencies
        run: npm ci

      - name: Publish
        run: npm publish --provenance --access public
