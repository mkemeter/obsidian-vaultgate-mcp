name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # required for OIDC Trusted Publishing and provenance attestation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish
        run: npm publish --provenance --access public
        # Authentication is handled by OIDC Trusted Publishing — no token needed.
        # Requires a Trusted Publisher configured on npmjs.com for this repo/workflow.
        # See: https://docs.npmjs.com/generating-provenance-statements
