<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44">
  <!--
    Monochrome gem crystal — VaultGate macOS menu-bar template icon.
    Replaces the keyhole with the brand's crystal diamond silhouette.

    Geometry: a pointed diamond/teardrop matching the app icon's crown-girdle-cusp
    structure, scaled from the 64×64 app icon to fill the 44×44 canvas with ~5px
    padding on all sides. Two slim interior facet slits are punched via
    fill-rule="evenodd", giving a faceted appearance at @2x (Retina) while
    the @1x (22×22) reads as a clean gem silhouette.

    macOS template image rules:
    - Only fill="black" — no stroke colors, no gradients, no opacity attributes
    - Background must remain fully transparent — no <rect> or fill on <svg>
    - macOS discards RGB channels; only the alpha mask is used for rendering

    Rasterised by generate-icons.js:
      assets/icon@2x.png  44×44  (black gem on transparent)
      assets/icon.png     22×22  (downscaled from @2x)
  -->
  <path
    fill="black"
    fill-rule="evenodd"
    d="
      M 22 5
      L 32 18.5
      L 27.5 31
      L 16.5 31
      L 12 18.5
      Z

      M 16.5 31
      L 22 40
      L 27.5 31
      Z

      M 22 7.5
      L 17.5 18.5
      L 21 17.5
      Z

      M 22 7.5
      L 23 17.5
      L 26.5 18.5
      Z
    "
  />
</svg>
