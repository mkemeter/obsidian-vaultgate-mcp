<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
    <title>VaultGate — Preferences</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #1a1a1a;
        --muted: #6b6b6b;
        --border: #d8d8d8;
        --accent: #7c3aed;
        --error: #c0392b;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1f1f22;
          --fg: #f0f0f0;
          --muted: #9b9b9b;
          --border: #3a3a40;
          --error: #e74c3c;
        }
      }
      body {
        font: 13px -apple-system, "Segoe UI", system-ui, sans-serif;
        margin: 0;
        padding: 18px 20px 14px;
        background: var(--bg);
        color: var(--fg);
        user-select: none;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 14px;
        font-weight: 600;
      }
      label {
        display: block;
        margin: 10px 0 4px;
        color: var(--muted);
      }
      input[type="text"],
      input[type="number"],
      select {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        font: inherit;
        color: var(--fg);
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 4px;
      }
      input.error {
        border-color: var(--error);
      }
      .field-error {
        color: var(--error);
        font-size: 11px;
        margin: 3px 0 0;
        min-height: 14px;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .row input[type="text"] {
        flex: 1;
      }
      button {
        padding: 6px 12px;
        font: inherit;
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 4px;
        cursor: pointer;
      }
      button.primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .checkbox {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 14px;
      }
      .footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 18px;
      }
    </style>
  </head>
  <body>
    <h1>VaultGate</h1>

    <label for="vault">Vault</label>
    <select id="vault"></select>

    <label for="port">Local server port</label>
    <input type="number" id="port" min="1024" max="65535" />
    <div class="field-error" id="port-error"></div>

    <label for="obsidian">Obsidian binary</label>
    <div class="row">
      <input type="text" id="obsidian" placeholder="/Applications/Obsidian.app/Contents/MacOS/obsidian" />
      <button id="browse">Browse…</button>
    </div>

    <div class="checkbox">
      <input type="checkbox" id="autostart" />
      <label for="autostart" style="margin: 0; color: var(--fg)">Open VaultGate at login</label>
    </div>

    <div class="footer">
      <button id="cancel">Cancel</button>
      <button id="save" class="primary">Save</button>
    </div>

    <script src="./prefs.js"></script>
  </body>
</html>
