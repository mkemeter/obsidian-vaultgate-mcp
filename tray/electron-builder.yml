# VaultGate tray app — packaging configuration

appId: com.obsidian-vaultgate-mcp.tray
productName: VaultGate
copyright: Copyright © 2026 Mathias Kemeter

directories:
  output: dist
  buildResources: build

files:
  - "dist/**"
  - "renderer/**"
  - "assets/icon.png"
  - "assets/icon@2x.png"
  - "assets/icon.svg"
  - "assets/icon-win.ico"
  - "node_modules/**"
  - "!node_modules/**/*.md"
  - "!node_modules/**/*.map"
  - "!node_modules/**/test/**"
  - "!node_modules/**/tests/**"

extraResources:
  - from: dist/server/server.mjs
    to: server/server.mjs
  - from: assets/models
    to: models
    filter: ["**/*.onnx", "**/*.json", "**/*.txt", "**/*.bin"]

asar: true
asarUnpack:
  - "**/*.node"
  # Native ML backends — must live on disk, not inside the asar archive.
  - "node_modules/onnxruntime-node/**"
  - "node_modules/sharp/**"

mac:
  category: public.app-category.productivity
  icon: assets/icon.svg
  target:
    - target: dmg
      arch: arm64   # Phase 1: arm64-only — see plan Phase 9 note for rationale
  extendInfo:
    LSUIElement: true   # background-only app: no Dock icon, no Cmd+Tab
  # No identity / hardenedRuntime / entitlements — unsigned for now (see plan)

dmg:
  sign: false
  artifactName: "${productName}-${version}-mac-arm64.${ext}"

win:
  icon: assets/icon-win.ico
  target:
    - target: nsis
      arch: x64
  artifactName: "${productName}-${version}-win-x64-setup.${ext}"
  # No sign options — unsigned for now

nsis:
  oneClick: false
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: false
  createStartMenuShortcut: true
  runAfterFinish: true

# No linux section → no Linux artifacts (intentional)
